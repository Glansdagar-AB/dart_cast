name: dart_cast
description: A pure Dart cross-platform casting package supporting Chromecast (CASTV2), AirPlay, and DLNA with built-in HTTP proxy for header injection.
version: 0.2.1
repository: https://github.com/abdelaziz-mahdy/dart_cast
homepage: https://github.com/abdelaziz-mahdy/dart_cast
issue_tracker: https://github.com/abdelaziz-mahdy/dart_cast/issues
topics:
  - cast
  - chromecast
  - airplay
  - dlna
  - streaming

environment:
  sdk: ^3.0.0

dependencies:
  cryptography: ^2.9.0
  http: ^1.2.0
  multicast_dns: ^0.3.2+6
  protobuf: ^3.1.0

dev_dependencies:
  test: ^1.25.0
  lints: ^5.0.0
